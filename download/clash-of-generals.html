function countTotalTroops(owner) {
  let total = 0;
  for (const p of gameState.provinces) { if (p.owner !== owner) continue; total += p.garrison.infantry + p.garrison.tanks + p.garrison.artillery; }
  return total;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.add('hidden'), 2500);
}

function updateUI() {
  document.getElementById('dateDisplay').textContent = formatDate(gameState.tick);
  const r = gameState.resources.player;
  const inc = gameState.income.player;
  document.getElementById('rMoney').textContent = Math.round(r.money);
  document.getElementById('rMan').textContent = Math.round(r.manpower);
  document.getElementById('rSteel').textContent = Math.round(r.steel);
  document.getElementById('rOil').textContent = Math.round(r.oil);
  if (currentTab === 'economy') renderEconomy();
  if (currentTab === 'research') renderResearch();
  if (currentTab === 'diplomacy') renderDiplomacy();
  if (!document.getElementById('bottomSheet').classList.contains('hidden') && gameState.selectedProvince >= 0) {
    showBottomSheet(gameState.selectedProvince);
  }
}

function checkGameOver() {
  const playerCount = gameState.provinces.filter(p => p.owner === OWNER_PLAYER).length;
  const enemyCount = gameState.provinces.filter(p => p.owner === OWNER_ENEMY).length;
  const stats = gameState.stats;

  if (enemyCount === 0 && !gameState.gameOver) {
    gameState.gameOver = true; gameState.speed = 0;
    if (tickTimer) clearInterval(tickTimer);
    playVictorySound();
    document.getElementById('goIcon').textContent = '🏆';
    document.getElementById('goTitle').textContent = '🎉 انتصار!';
    document.getElementById('goTitle').className = 'text-2xl font-bold mb-2 text-green-400';
    document.getElementById('goDesc').textContent = `استوليت على كل المقاطعات في ${formatDate(gameState.tick)}!`;
    document.getElementById('goStats').innerHTML = `
      <div class="flex justify-between"><span>📅 الأيام:</span><b>${gameState.tick}</b></div>
      <div class="flex justify-between"><span>🏴 المقاطعات المحتلة:</span><b>${stats.conquered}</b></div>
      <div class="flex justify-between"><span>💔 الخسائر:</span><b>${stats.troopsLost}</b></div>
      <div class="flex justify-between"><span>🏗️ المباني:</span><b>${stats.buildingsBuilt}</b></div>`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
    addNotification('🎉 انتصار! تم احتلال كل المقاطعات!', 'victory');
    localStorage.removeItem(SAVE_KEY);
  } else if (playerCount === 0 && !gameState.gameOver) {
    gameState.gameOver = true; gameState.speed = 0;
    if (tickTimer) clearInterval(tickTimer);
    playDefeatSound();
    document.getElementById('goIcon').textContent = '💀';
    document.getElementById('goTitle').textContent = '😢 هزيمة';
    document.getElementById('goTitle').className = 'text-2xl font-bold mb-2 text-red-400';
    document.getElementById('goDesc').textContent = `خسرت كل مقاطعاتك في ${formatDate(gameState.tick)}`;
    document.getElementById('goStats').innerHTML = `
      <div class="flex justify-between"><span>📅 الأيام:</span><b>${gameState.tick}</b></div>
      <div class="flex justify-between"><span>🏴 المقاطعات المحتلة:</span><b>${stats.conquered}</b></div>
      <div class="flex justify-between"><span>💔 الخسائر:</span><b>${stats.troopsLost}</b></div>
      <div class="flex justify-between"><span>🏗️ المباني:</span><b>${stats.buildingsBuilt}</b></div>`;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
    addNotification('😢 هزيمة! تم احتلال كل مقاطعاتك.', 'defeat');
    localStorage.removeItem(SAVE_KEY);
  }
}

function startNewGame() {
  playClickSound();
  document.getElementById('startOverlay').classList.add('hidden');
  localStorage.removeItem(SAVE_KEY);
  initNewGame();
  gameState.started = true;
  setSpeed(1);
  showToast('🎮 بدأت اللعبة! المس مقاطعة للاختيار');
  // إظهار التعليمات إذا لم تكتمل من قبل
  if (!isTutorialDone()) showTutorial();
}

function resumeGame() {
  playClickSound();
  document.getElementById('startOverlay').classList.add('hidden');
  if (loadGame()) {
    // إعادة بناء الكاميرا
    const capital = gameState.provinces.find(p => p.isCapital && p.owner === OWNER_PLAYER) || gameState.provinces[0];
    centerCamera(capital.centroid.x, capital.centroid.y, true);
    initInput();
    updateUI();
    setSpeed(gameState.speed || 1);
    showToast('📂 تم تحميل اللعبة المحفوظة!');
    addNotification('تم استئناف اللعبة المحفوظة', 'info');
  } else {
    showToast('❌ فشل تحميل اللعبة المحفوظة!');
    initNewGame();
    gameState.started = true;
    setSpeed(1);
  }
}

// ================================================================
// ════════════════════════════════════════════════════════════════════
//  ١٩. Minimap (خريطة مصغرة)
// ════════════════════════════════════════════════════════════════════
function renderMinimap() {
  if (!minimapCtx || !gameState || !gameState.provinces.length) return;
  const mc = minimapCtx;
  const mw = 150, mh = 100;
  const sx = mw / MAP_W, sy = mh / MAP_H;

  mc.fillStyle = '#0a0f1a';
  mc.fillRect(0, 0, mw, mh);

  // رسم المقاطعات كنقاط ملونة
  for (const prov of gameState.provinces) {
    const c = prov.centroid;
    let color;
    if (prov.owner === OWNER_PLAYER) color = '#3b82f6';
    else if (prov.owner === OWNER_ENEMY) color = '#ef4444';
    else color = '#6b7280';

    mc.fillStyle = color;
    mc.globalAlpha = 0.8;
    mc.beginPath();
    // رسم مضلع مصغر
    for (let j = 0; j < prov.polygon.length; j++) {
      const px = prov.polygon[j].x * sx, py = prov.polygon[j].y * sy;
      if (j === 0) mc.moveTo(px, py); else mc.lineTo(px, py);
    }
    mc.closePath();
    mc.fill();
    mc.globalAlpha = 1;
  }

  // مؤشر الكاميرا
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);
  mc.strokeStyle = '#d4a844';
  mc.lineWidth = 1.5;
  mc.strokeRect(topLeft.x * sx, topLeft.y * sy, (bottomRight.x - topLeft.x) * sx, (bottomRight.y - topLeft.y) * sy);
}

function handleMinimapClick(event) {
  const rect = document.getElementById('minimapContainer').getBoundingClientRect();
  const mx = event.clientX - rect.left;
  const my = event.clientY - rect.top;
  // تحويل إحداثيات Minimap إلى إحداثيات العالم
  const worldX = (mx / 150) * MAP_W;
  const worldY = (my / 100) * MAP_H;
  playClickSound();
  centerCamera(worldX, worldY, true);
}

// ================================================================
// ════════════════════════════════════════════════════════════════════
//  ٢٠. محرك الرسم (Canvas Renderer)
// ════════════════════════════════════════════════════════════════════
let lastRenderTime = 0;

function resizeCanvas() {
  const area = document.getElementById('gameArea');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
}

function render(timestamp) {
  // === تحسين الأداء: تقليل frame rate عند عدم ظهور التبويب ===
  if (document.hidden) {
    requestAnimationFrame(render);
    return;
  }
  // Throttle to ~30fps when not actively needed
  if (timestamp - lastRenderTime < 30) {
    requestAnimationFrame(render);
    return;
  }
  lastRenderTime = timestamp;

  updateCamera();
  updateCombatAnimations();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawProvinces();
  drawLabels();

  if (gameState.mode === 'move' && gameState.moveFrom >= 0) drawMoveIndicators();

  // رسم Minimap
  renderMinimap();

  requestAnimationFrame(render);
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(30,58,95,0.15)';
  ctx.lineWidth = 0.5;
  const step = 100;
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);
  const startX = Math.floor(topLeft.x / step) * step;
  const startY = Math.floor(topLeft.y / step) * step;
  for (let x = startX; x <= bottomRight.x; x += step) {
    const s1 = worldToScreen(x, topLeft.y), s2 = worldToScreen(x, bottomRight.y);
    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
  }
  for (let y = startY; y <= bottomRight.y; y += step) {
    const s1 = worldToScreen(topLeft.x, y), s2 = worldToScreen(bottomRight.x, y);
    ctx.beginPath(); ctx.moveTo(s1.x, s1.y); ctx.lineTo(s2.x, s2.y); ctx.stroke();
  }
}

function drawProvinces() {
  const now = Date.now();
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);
  // === Frustum Culling: لا ترسم المقاطعات خارج الشاشة ===
  const viewMargin = 200;

  for (let i = 0; i < gameState.provinces.length; i++) {
    const prov = gameState.provinces[i];
    // Quick bounds check
    const c = prov.centroid;
    if (c.x < topLeft.x - viewMargin || c.x > bottomRight.x + viewMargin ||
        c.y < topLeft.y - viewMargin || c.y > bottomRight.y + viewMargin) continue;

    const poly = prov.polygon;
    const colors = OWNER_COLORS[prov.owner];
    const isSelected = gameState.selectedProvince === i;
    const screenPoly = poly.map(v => worldToScreen(v.x, v.y));
    const terrainColor = TERRAINS[prov.terrain].color;

    ctx.beginPath();
    ctx.moveTo(screenPoly[0].x, screenPoly[0].y);
    for (let j = 1; j < screenPoly.length; j++) ctx.lineTo(screenPoly[j].x, screenPoly[j].y);
    ctx.closePath();

    // تأثير وميض القتال
    let combatFlash = null;
    for (const anim of combatAnimations) {
      if (anim.provId === i && anim.type.startsWith('flash')) {
        const elapsed = now - anim.startTime;
        const alpha = 1 - elapsed / anim.duration;
        combatFlash = anim.type === 'flash-red'
          ? `rgba(239,68,68,${alpha * 0.5})`
          : `rgba(74,222,128,${alpha * 0.5})`;
      }
    }

    ctx.fillStyle = colors.fill;
    ctx.fill();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = terrainColor;
    ctx.fill();
    ctx.globalAlpha = 1;

    // رسم أيقونات تضاريس صغيرة متفرقة
    if (camera.zoom > 0.4) {
      drawTerrainIcons(prov, screenPoly);
    }

    // حركة الوميض
    if (combatFlash) {
      ctx.fillStyle = combatFlash;
      ctx.fill();
    }

    // حدود المقاطعة
    ctx.strokeStyle = colors.stroke;
    ctx.lineWidth = isSelected ? 3 : 1.5;
    ctx.stroke();

    // تأثير التحديد
    if (isSelected) {
      ctx.shadowColor = '#d4a844'; ctx.shadowBlur = 15;
      ctx.strokeStyle = '#d4a844'; ctx.lineWidth = 2;
      ctx.stroke(); ctx.shadowBlur = 0;
    }

    // === حدود نابضة للعاصمة ===
    if (prov.isCapital && prov.owner === OWNER_PLAYER) {
      const pulseAlpha = 0.4 + 0.6 * Math.abs(Math.sin(now / 500));
      ctx.strokeStyle = `rgba(212,168,68,${pulseAlpha})`;
      ctx.lineWidth = 3;
      ctx.stroke();
    }
  }
}

// رسم أيقونات التضاريس المتفرقة داخل المقاطعة
function drawTerrainIcons(prov, screenPoly) {
  const terrain = TERRAINS[prov.terrain];
  if (!terrain.icon || prov.terrain === 'plains') return;
  // رسم 1-3 أيقونات صغيرة
  const seed = prov.id * 7;
  const count = 1 + (seed % 3);
  ctx.font = `${Math.max(6, 8 * camera.zoom)}px sans-serif`;
  ctx.globalAlpha = 0.3;
  for (let k = 0; k < count; k++) {
    // وضع عشوائي ثابت
    const offset = ((seed + k * 31) % 100) / 100;
    const idx = Math.floor(offset * screenPoly.length);
    const next = (idx + 1) % screenPoly.length;
    const px = screenPoly[idx].x + (screenPoly[next].x - screenPoly[idx].x) * ((seed + k * 17) % 50) / 50;
    const py = screenPoly[idx].y + (screenPoly[next].y - screenPoly[idx].y) * ((seed + k * 23) % 50) / 50;
    ctx.fillText(terrain.icon, px, py);
  }
  ctx.globalAlpha = 1;
}

function drawLabels() {
  const hasEspionage = gameState.tech.player.completed.espion;
  const now = Date.now();
  const topLeft = screenToWorld(0, 0);
  const bottomRight = screenToWorld(canvas.width, canvas.height);

  for (let i = 0; i < gameState.provinces.length; i++) {
    const prov = gameState.provinces[i];
    const s = worldToScreen(prov.centroid.x, prov.centroid.y);
    if (s.x < -100 || s.x > canvas.width + 100 || s.y < -50 || s.y > canvas.height + 50) continue;

    const terrain = TERRAINS[prov.terrain];
    const fontSize = Math.max(8, Math.min(12, 10 * camera.zoom));

    // اسم المقاطعة
    ctx.font = `bold ${fontSize}px 'Segoe UI',Tahoma,Arial,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const nameWidth = ctx.measureText(prov.name).width;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(s.x - nameWidth / 2 - 3, s.y - fontSize - 2, nameWidth + 6, fontSize + 4);
    ctx.fillStyle = '#e2e8f0';
    ctx.fillText(prov.name + (prov.isCapital ? ' ⭐' : ''), s.x, s.y - fontSize / 2);

    // أيقونة التضاريس
    const iconSize = Math.max(8, Math.min(14, 12 * camera.zoom));
    ctx.font = `${iconSize}px sans-serif`;
    ctx.fillText(terrain.icon, s.x, s.y + fontSize / 2 + iconSize / 2);

    // === Fog of War: إظهار "?" بدلاً من القوات للعدو بدون تجسس ===
    const totalTroops = prov.garrison.infantry + prov.garrison.tanks + prov.garrison.artillery;
    if (totalTroops > 0) {
      const showTroops = prov.owner === OWNER_PLAYER || prov.owner === OWNER_NEUTRAL || hasEspionage;
      const troopFontSize = Math.max(7, Math.min(11, 9 * camera.zoom));

      if (showTroops) {
        // شارات عسكرية للقوات
        const inf = prov.garrison.infantry, tnk = prov.garrison.tanks, art = prov.garrison.artillery;
        const troopText = `🗡️${inf} 🔥${tnk} 💥${art}`;
        const shortText = `⚔️${totalTroops}`;
        const displayText = camera.zoom > 0.6 ? troopText : shortText;

        ctx.font = `bold ${troopFontSize}px 'Segoe UI',Tahoma,Arial,sans-serif`;
        const tw = ctx.measureText(displayText).width;

        // خلفية الشارة
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        const badgeH = troopFontSize + 6;
        const badgeW = tw + 10;
        const badgeY = s.y + fontSize + iconSize / 2 + 2;
        // رسم شارة بزوايا مستديرة
        const bx = s.x - badgeW / 2, by = badgeY;
        ctx.beginPath();
        ctx.roundRect(bx, by, badgeW, badgeH, 3);
        ctx.fill();

        // لون حسب المالك
        ctx.fillStyle = prov.owner === OWNER_PLAYER ? '#60a5fa' : prov.owner === OWNER_ENEMY ? '#f87171' : '#9ca3af';
        ctx.fillText(displayText, s.x, badgeY + troopFontSize / 2 + 3);
      } else {
        // حجب القوات (بدون أبحاث التجسس)
        ctx.font = `bold ${troopFontSize}px 'Segoe UI',Tahoma,Arial,sans-serif`;
        ctx.fillStyle = '#ef4444';
        ctx.fillText('❓', s.x, s.y + fontSize + iconSize / 2 + troopFontSize / 2 + 4);
      }
    }

    // مؤشر التجنيد
    if (prov.recruiting) {
      const rFontSize = Math.max(6, Math.min(10, 8 * camera.zoom));
      ctx.font = `${rFontSize}px sans-serif`;
      ctx.fillText('🔨', s.x + 20 * camera.zoom, s.y);
    }
  }
}

function drawMoveIndicators() {
  const fromProv = gameState.provinces[gameState.moveFrom];
  for (const adjId of fromProv.adjacent) {
    const adj = gameState.provinces[adjId];
    const poly = adj.polygon.map(v => worldToScreen(v.x, v.y));
    const isFriendly = adj.owner === fromProv.owner;
    ctx.beginPath();
    ctx.moveTo(poly[0].x, poly[0].y);
    for (let j = 1; j < poly.length; j++) ctx.lineTo(poly[j].x, poly[j].y);
    ctx.closePath();
    ctx.fillStyle = isFriendly ? 'rgba(74,124,89,0.3)' : 'rgba(220,38,38,0.3)';
    ctx.fill();
    ctx.strokeStyle = isFriendly ? 'rgba(74,124,89,0.8)' : 'rgba(220,38,38,0.8)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }
}

// ================================================================
// ════════════════════════════════════════════════════════════════════
//  ٢١. تهيئة اللعبة
// ════════════════════════════════════════════════════════════════════
function initNewGame() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  minimapCanvas = document.getElementById('minimapCanvas');
  minimapCtx = minimapCanvas.getContext('2d');

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  cachedVoronoi = null; // إعادة توليد الخريطة
  _seed = 42;

  gameState = createGameState();

  const { points, names } = generateSeedPoints();
  const voronoiPolys = generateVoronoi(points);
  computeAdjacency(voronoiPolys);

  for (let i = 0; i < voronoiPolys.length; i++) {
    const vp = voronoiPolys[i];
    const nameData = names[i];
    const terrain = assignTerrain(vp.centroid);

    let garrison = { infantry: 0, tanks: 0, artillery: 0 };
    if (nameData.owner === OWNER_PLAYER) {
      if (i === 0) {
        garrison = { infantry: 50, tanks: 10, artillery: 5 };
      } else {
        garrison = { infantry: randInt(10, 20), tanks: randInt(0, 5), artillery: randInt(0, 2) };
      }
    } else if (nameData.owner === OWNER_ENEMY) {
      if (i === 15) {
        garrison = { infantry: 50, tanks: 10, artillery: 5 };
      } else {
        garrison = { infantry: randInt(10, 20), tanks: randInt(0, 5), artillery: randInt(0, 2) };
      }
    } else {
      // === قوات محايدة أقل: 3-10 بدلاً من 5-15 ===
      garrison = { infantry: randInt(3, 10), tanks: 0, artillery: 0 };
    }

    gameState.provinces.push({
      id: i,
      name: nameData.name,
      terrain: terrain,
      owner: nameData.owner,
      polygon: vp.vertices,
      centroid: vp.centroid,
      adjacent: vp.adjacent,
      garrison: garrison,
      buildings: { factory: 0, barracks: 0, oilwell: 0, fort: 0, arms: 0 },
      recruiting: null,
      seed: vp.seed,
      isCapital: (i === 0 || i === 15) // عاصمتا اللاعب والعدو
    });
  }

  const capital = gameState.provinces[0];
  centerCamera(capital.centroid.x, capital.centroid.y, true);
  initInput();
  updateUI();
  requestAnimationFrame(render);
}

function initGame() {
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  minimapCanvas = document.getElementById('minimapCanvas');
  minimapCtx = minimapCanvas.getContext('2d');

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // التحقق من وجود لعبة محفوظة
  if (hasSavedGame()) {
    document.getElementById('resumeBtn').classList.remove('hidden');
  }

  // إنشاء حالة اللعبة مبدئياً لعرض الخريطة في الخلفية
  initNewGame();
  gameState.started = false; // لا تبدأ حتى يضغط المستخدم
}

// بدء اللعبة عند تحميل الصفحة
window.addEventListener('load', initGame);

// === إغلاق لوحة الإشعارات عند الضغط خارجها ===
document.addEventListener('click', (e) => {
  const panel = document.getElementById('notifPanel');
  const bell = document.getElementById('bellBtn');
  if (!panel.classList.contains('hidden') && !panel.contains(e.target) && !bell.contains(e.target)) {
    panel.classList.add('hidden');
  }
});
</script>
